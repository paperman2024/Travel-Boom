<!DOCTYPE html>
<html>
    <head>
        <title>
            Travel Boom
        </title>
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <script src="travel_recommendation.js" defer></script>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <nav id="navbar">
            <div class="navbar-logo">
                <img id="logo-s" src="TravelBoomIcon.png">
                <h1>Travel Boom</h1>
            </div>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about-us">About Us</a></li>
                <li><a href="#contact-us">Contact Us</a></li>
            </ul>
            <div class="searchbar">
                <input id="search-input" placeholder="Enter a destination or keyword">
                <button id="search-button">Search</button>
                <button id="search-clear">Clear</button>
            </div>
        </nav>
        <img id="background-img" src="TravelBoomBackground.jpg">
        <div id="social-media">
            <ul>
                <li><a href="#" class="fa fa-facebook"></a></li>
                <li><a href="#" class="fa fa-twitter"></a></li>
                <li><a href="#" class="fa fa-youtube"></a></li>
                <li><a href="#" class="fa fa-instagram"></a></li>
            </ul>
        </div>
        <section id="home">
            <div id="home-text">
                <h2>Titel of Home</h2>
                <p>Description of Home</p>
            </div>

        </section>
        <section id="about-us">
            <div id="company-info">
                <h2>About Us</h2>
                <p>Company Description</p>
            </div>
            <div id="company-employees">
                <h2>Our Team</h2>
                <ul id="employee-list">
                    <li><button>Placeholder1</button></li>
                    <li><button>Placeholder2</button></li>
                    <li><button>Placeholder3</button></li>
                </ul>
            </div>
        </section>
        <section id="contact-us">
            <div id="contact-info">
                <h2>Contact us</h2>
                <p>Get in touch</p>
            </div>
            <div id="contact-form">
                <form>
                    <label for="name">Name</label>
                    <input type="text" name="name" id="name" placeholder="Enter your name">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="Enter your email">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Enter your message"></textarea>
                    <button type="submit">Submit</button>
                </form>
            </div>
        </section>
        <section id="search">
            <h2>Search results:</h2>
            <div id="search-results">

            </div>
        </section>
    </body>
</html>
